name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test]" build twine
      - run: ruff check src tests scripts
      - run: coverage run -m unittest discover -s tests
      - run: coverage report
      - run: python -m compileall -q src
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python -m venv .smoke-venv
      - run: .smoke-venv/bin/python -m pip install dist/*.whl
      - run: .smoke-venv/bin/python scripts/release_smoke.py

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: docker build --file Containerfile --tag onceproof:ci .
      - run: docker run --rm onceproof:ci --version
      - run: docker run --detach --name onceproof-ci onceproof:ci
      - name: Wait for container readiness
        run: |
          for attempt in $(seq 1 30); do
            status=$(docker inspect --format '{{.State.Health.Status}}' onceproof-ci)
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              docker logs onceproof-ci
              exit 1
            fi
            sleep 1
          done
          docker logs onceproof-ci
          exit 1
      - if: always()
        run: docker rm --force onceproof-ci || true

  source-distribution:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install build twine
      - run: python -m build --sdist
      - run: python -m twine check dist/*
      - run: python -m venv .sdist-smoke-venv
      - run: .sdist-smoke-venv/bin/python -m pip install dist/*.tar.gz
      - run: .sdist-smoke-venv/bin/python scripts/release_smoke.py

  windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test]"
      - run: ruff check src tests scripts
      - run: coverage run -m unittest discover -s tests
      - run: coverage report
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python -m venv .smoke-venv
      - shell: pwsh
        run: .smoke-venv\Scripts\python.exe -m pip install (Resolve-Path dist\*.whl)
      - run: .smoke-venv\Scripts\python.exe scripts\release_smoke.py
